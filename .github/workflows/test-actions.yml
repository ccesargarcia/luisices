name: Test GitHub Actions

on:
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test echo
        run: |
          echo "GitHub Actions is working!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
