name: Deploy to Firebase Hosting (Dev)

on:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: "firebase-dev"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env.local with DEV secrets
        env:
          API_KEY: ${{ secrets.DEV_VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.DEV_VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.DEV_VITE_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.DEV_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.DEV_VITE_FIREBASE_APP_ID }}
          MEASUREMENT_ID: ${{ secrets.DEV_VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          printf 'VITE_FIREBASE_API_KEY=%s\n' "$API_KEY" >> .env.local
          printf 'VITE_FIREBASE_AUTH_DOMAIN=%s\n' "$AUTH_DOMAIN" >> .env.local
          printf 'VITE_FIREBASE_PROJECT_ID=%s\n' "$PROJECT_ID" >> .env.local
          printf 'VITE_FIREBASE_STORAGE_BUCKET=%s\n' "$STORAGE_BUCKET" >> .env.local
          printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "$MESSAGING_SENDER_ID" >> .env.local
          printf 'VITE_FIREBASE_APP_ID=%s\n' "$APP_ID" >> .env.local
          printf 'VITE_FIREBASE_MEASUREMENT_ID=%s\n' "$MEASUREMENT_ID" >> .env.local

      - name: Build (dev)
        run: npm run build

      - name: Deploy to Firebase Hosting (dev.luisices.com.br)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: ${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}
          channelId: live
